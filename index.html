<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy First Clinical Pathways</title>
    <style>
        :root {
            --nhs-blue: #005EB8;
            --nhs-dark-blue: #003087;
            --nhs-green: #007F3B;
            --nhs-red: #D5281B;
            --grey: #E8EDEE;
            --text-color: #231f20;
            --alert-bg: #FFEB3B; 
            --gateway-bg: #FFF9C4; 
            --gateway-border: #FBC02D;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--nhs-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 { color: var(--nhs-blue); margin-bottom: 5px; }

        #menu-container {
            display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px;
        }

        .menu-btn {
            background-color: white; color: var(--nhs-blue); border: 2px solid var(--nhs-blue);
            padding: 20px; font-size: 1.2em; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .menu-btn:hover { background-color: var(--nhs-blue); color: white; }

        #pathway-wrapper { display: none; }

        .controls { margin-bottom: 20px; }

        .back-btn {
            background-color: #768692; color: white; border: none; padding: 10px 15px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        #pathway-title { color: var(--nhs-dark-blue); margin-bottom: 20px; }

        #pathway-content { display: flex; flex-direction: column; gap: 20px; }

        .step-card {
            background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            opacity: 0; transform: translateY(10px); animation: fadeIn 0.4s forwards ease-out;
            border-left: 5px solid var(--nhs-blue);
        }

        .step-card.gateway {
            background-color: var(--gateway-bg); border-left: 5px solid var(--gateway-border);
        }

        .gateway-badge {
            background-color: var(--gateway-border); color: #333; font-size: 0.8em;
            font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px;
        }

        .step-question { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; white-space: pre-wrap; }

        .options-container { display: flex; flex-wrap: wrap; gap: 10px; }

        button.option-btn {
            background-color: var(--nhs-blue); color: white; border: none; padding: 12px 24px;
            font-size: 1em; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        button.option-btn:hover { background-color: var(--nhs-dark-blue); }
        button.option-btn.disabled { background-color: var(--grey); color: #768692; pointer-events: none; opacity: 0.6; }
        button.option-btn.selected { background-color: var(--nhs-dark-blue); outline: 3px solid #FFB81C; outline-offset: 2px; }

        /* Checkbox Styling */
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .checkbox-item {
            display: flex; align-items: flex-start; gap: 10px; background: #f9f9f9;
            padding: 12px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s;
        }
        .checkbox-item:hover { background: #f1f1f1; border-color: var(--nhs-blue); }
        .checkbox-item input[type="checkbox"] { margin-top: 4px; transform: scale(1.3); cursor: pointer; }
        .checkbox-label { font-size: 1em; cursor: pointer; }
        
        button.continue-btn {
            background-color: var(--nhs-green); color: white; border: none; padding: 12px 24px;
            font-size: 1.1em; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;
        }
        button.continue-btn:hover { background-color: #005a2b; }

        .result-card {
            background: var(--alert-bg); padding: 20px; border-radius: 8px; font-weight: bold;
            color: #333; border-left: 5px solid #D32F2F; animation: fadeIn 0.4s forwards ease-out; white-space: pre-wrap;
        }

        .news2-btn {
            background-color: var(--nhs-red); color: white; border: none; padding: 10px 20px;
            font-size: 1em; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }

        /* Modal Styling */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); overflow: auto;
        }
        .modal-content {
            background-color: white; margin: 5% auto; padding: 25px; border-radius: 8px;
            width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-modal:hover { color: black; }
        .calc-form-group { margin-bottom: 15px; }
        .calc-form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .calc-form-group input, .calc-form-group select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em;
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pharmacy First Clinical Pathways</h1>
        <p>Interactive Diagnostic Tool</p>
    </div>

    <div id="menu-container"></div>

    <div id="pathway-wrapper">
        <div class="controls">
            <button class="back-btn" onclick="showMenu()">← Back to Menu / Start Over</button>
        </div>
        <h2 id="pathway-title">Pathway Title</h2>
        <div id="pathway-content"></div>
    </div>

    <div id="news2-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeNews2()">&times;</span>
            <h2 style="color: var(--nhs-blue); margin-top: 0;">NEWS2 Calculator</h2>
            <p>Standard scale calculation.</p>
            
            <div class="calc-form-group">
                <label>Respiration Rate (breaths/min)</label>
                <input type="number" id="n-rr" placeholder="e.g. 16">
            </div>
            <div class="calc-form-group">
                <label>SpO2 (%)</label>
                <input type="number" id="n-spo2" placeholder="e.g. 98">
            </div>
            <div class="calc-form-group">
                <label>Systolic Blood Pressure (mmHg)</label>
                <input type="number" id="n-sbp" placeholder="e.g. 120">
            </div>
            <div class="calc-form-group">
                <label>Pulse (beats/min)</label>
                <input type="number" id="n-hr" placeholder="e.g. 75">
            </div>
            <div class="calc-form-group">
                <label>Temperature (°C)</label>
                <input type="number" step="0.1" id="n-temp" placeholder="e.g. 37.2">
            </div>
            
            <button class="continue-btn" onclick="calculateNews2()">Calculate Score</button>
        </div>
    </div>

    <script>
        // 1. THE DATA
        const pathwaysDB = {
            "uti": {
                title: "Uncomplicated Urinary Tract Infection",
                nodes: {
                    "start": {
                        question: "Consider the risk of deterioration, red flags or serious illness.",
                        isGateway: true,
                        options: [
                            { label: "YES (Patient at risk)", nextId: "urgent_referral" },
                            { label: "NO (No immediate red flags)", nextId: "pyelonephritis" }
                        ]
                    },
                    "urgent_referral": {
                        isResult: true,
                        text: "Urgent same day referral:\n• General practice\n• Relevant out of hours service",
                        needsNews2: true 
                    },
                    "pyelonephritis": {
                        type: "checkbox",
                        question: "Check for any new signs/symptoms of PYELONEPHRITIS:",
                        symptoms: [
                            "Kidney pain/tenderness in back under ribs",
                            "Flu like illness",
                            "Shaking chills (rigors) or temperature 37.9°C or above",
                            "Nausea/vomiting"
                        ],
                        logic: [
                            { condition: ">=", count: 1, nextId: "urgent_referral" },
                            { condition: "==", count: 0, nextId: "exclusions" }
                        ]
                    },
                    "exclusions": {
                        type: "checkbox",
                        question: "Does the patient have ANY of the following exclusions:",
                        symptoms: [
                            "Vaginal discharge: 80% do not have UTI",
                            "Urethritis (caused by irritation or inflammation)",
                            "Sexually transmitted infection risk",
                            "Signs or symptoms of pregnancy",
                            "Genitourinary syndrome of menopause (vulvovaginal atrophy)",
                            "Patient is immunosuppressed"
                        ],
                        logic: [
                            { condition: ">=", count: 1, nextId: "onward_referral" },
                            { condition: "==", count: 0, nextId: "diagnostic_signs" }
                        ]
                    },
                    "onward_referral": {
                        isResult: true,
                        text: "Onward referral:\n• General practice\n• Sexual health clinics\n• Other provider as appropriate"
                    },
                    "diagnostic_signs": {
                        type: "checkbox",
                        isGateway: true,
                        question: "Select any of the 3 key diagnostic signs/symptoms present:",
                        symptoms: [
                            "Dysuria (Acute pain or burning sensation when passing urine or at the end of urination)",
                            "New nocturia (needing to pass urine in the night)",
                            "Urine cloudy to the naked eye"
                        ],
                        logic: [
                            { condition: "==", count: 0, nextId: "no_symptom" },
                            { condition: "==", count: 1, nextId: "one_symptom" },
                            { condition: ">=", count: 2, nextId: "two_symptoms" }
                        ]
                    },
                    "no_symptom": {
                        type: "checkbox",
                        question: "Are there other urinary symptoms present?",
                        symptoms: [
                            "Urgency",
                            "Frequency",
                            "Visible haematuria",
                            "Suprapubic pain/tenderness"
                        ],
                        logic: [
                            { condition: ">=", count: 1, nextId: "uti_equally_likely" },
                            { condition: "==", count: 0, nextId: "uti_less_likely" }
                        ]
                    },
                    "uti_equally_likely": {
                        isResult: true,
                        text: "UTI equally likely to other diagnosis.\n\nOnward referral:\n• General practice\n• Sexual health clinics\n• Other provider as appropriate\n\nFOR ALL PATIENTS: share self-care and safety-netting advice using TARGET UTI leaflet."
                    },
                    "uti_less_likely": {
                        isResult: true,
                        text: "UTI less likely.\n\nSelf-care and pain relief.\n\nFOR ALL PATIENTS: share self-care and safety-netting advice using TARGET UTI leaflet."
                    },
                    "one_symptom": {
                        isResult: true,
                        text: "Shared decision making approach using TARGET UTI resources.\n\nIn patients that describe their symptoms as mild consider pain relief and self care as first line treatment.\n\nAsk patient to return to Pharmacy if no improvement in 48 hours for pharmacist reassessment.\n\nFOR ALL PATIENTS: share self-care and safety-netting advice."
                    },
                    "two_symptoms": {
                        isResult: true,
                        text: "In patients with moderate to severe symptoms, offer nitrofurantoin for 3 days (subject to inclusion/exclusion criteria in PGD) plus self-care.\n\nFOR ALL PATIENTS: If symptoms worsen rapidly or significantly at any time, OR do not improve in 48 hours of taking antibiotics -> Onward referral.\n\nFOR ALL PATIENTS: share self-care and safety-netting advice using TARGET UTI leaflet."
                    }
                }
            }
        };

        // 2. THE ENGINE
        const menuContainer = document.getElementById('menu-container');
        const pathwayWrapper = document.getElementById('pathway-wrapper');
        const pathwayTitle = document.getElementById('pathway-title');
        const pathwayContent = document.getElementById('pathway-content');
        let currentPathwayId = null;
        let renderedNodes = [];

        function initMenu() {
            menuContainer.innerHTML = ''; 
            for (const [key, pathway] of Object.entries(pathwaysDB)) {
                if(Object.keys(pathway.nodes).length > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn';
                    btn.innerText = pathway.title;
                    btn.onclick = () => loadPathway(key);
                    menuContainer.appendChild(btn);
                }
            }
        }

        function loadPathway(pathwayKey) {
            currentPathwayId = pathwayKey;
            const pathwayData = pathwaysDB[pathwayKey];
            menuContainer.style.display = 'none';
            pathwayWrapper.style.display = 'block';
            pathwayTitle.innerText = pathwayData.title;
            pathwayContent.innerHTML = '';
            renderedNodes = [];
            renderNode('start');
        }

        function showMenu() {
            pathwayWrapper.style.display = 'none';
            menuContainer.style.display = 'grid';
            currentPathwayId = null;
        }

        function clearBelow(nodeId) {
            const currentIndex = renderedNodes.indexOf(nodeId);
            if (currentIndex > -1) {
                const nodesToRemove = renderedNodes.splice(currentIndex + 1);
                nodesToRemove.forEach(id => {
                    const el = document.getElementById(`step-${id}`);
                    if (el) el.remove();
                });
            }
        }

        function renderNode(nodeId) {
            const pathwayData = pathwaysDB[currentPathwayId];
            const nodeData = pathwayData.nodes[nodeId];
            if (!nodeData) return;

            const stepDiv = document.createElement('div');
            stepDiv.id = `step-${nodeId}`;
            renderedNodes.push(nodeId);

            // RENDER RESULT CARDS & NEWS2 BUTTON
            if (nodeData.isResult) {
                stepDiv.className = 'result-card';
                stepDiv.innerText = nodeData.text;
                
                if(nodeData.needsNews2) {
                    const newsBtn = document.createElement('button');
                    newsBtn.className = 'news2-btn';
                    newsBtn.innerText = "🧮 Calculate NEWS2 Score";
                    newsBtn.onclick = () => document.getElementById('news2-modal').style.display = "block";
                    stepDiv.appendChild(document.createElement('br'));
                    stepDiv.appendChild(newsBtn);
                }

                pathwayContent.appendChild(stepDiv);
                stepDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                return;
            }

            // RENDER QUESTION CARDS
            stepDiv.className = 'step-card';
            if (nodeData.isGateway) {
                stepDiv.classList.add('gateway');
                const badge = document.createElement('div');
                badge.className = 'gateway-badge';
                badge.innerText = 'Gateway Point';
                stepDiv.appendChild(badge);
            }
            
            const questionText = document.createElement('div');
            questionText.className = 'step-question';
            questionText.innerText = nodeData.question;
            stepDiv.appendChild(questionText);

            // RENDER CHECKBOXES
            if (nodeData.type === "checkbox") {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'checkbox-group';
                
                nodeData.symptoms.forEach((symp, index) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.value = index;
                    cb.className = `cb-${nodeId}`;
                    cb.onchange = () => clearBelow(nodeId);
                    
                    const span = document.createElement('span');
                    span.className = 'checkbox-label';
                    span.innerText = symp;

                    label.appendChild(cb);
                    label.appendChild(span);
                    groupDiv.appendChild(label);
                });

                const evalBtn = document.createElement('button');
                evalBtn.className = 'continue-btn';
                evalBtn.innerText = "Confirm Selection";
                evalBtn.onclick = () => {
                    clearBelow(nodeId);
                    let checkedCount = 0;
                    document.querySelectorAll(`.cb-${nodeId}`).forEach(cb => { if(cb.checked) checkedCount++; });

                    evalBtn.innerText = "Confirmed (" + checkedCount + " Selected)";
                    evalBtn.style.backgroundColor = "#768692";

                    for (let rule of nodeData.logic) {
                        if (rule.condition === "==" && checkedCount === rule.count) {
                            renderNode(rule.nextId); return;
                        }
                        if (rule.condition === ">=" && checkedCount >= rule.count) {
                            renderNode(rule.nextId); return;
                        }
                    }
                };

                stepDiv.appendChild(groupDiv);
                stepDiv.appendChild(evalBtn);
            } 
            // RENDER STANDARD BUTTONS
            else if (nodeData.options) {
                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'options-container';

                nodeData.options.forEach((option, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = option.label;
                    btn.onclick = () => {
                        clearBelow(nodeId);
                        
                        // Grey out unselected options
                        const allBtns = optionsContainer.querySelectorAll('.option-btn');
                        allBtns.forEach((b, i) => {
                            if (i === index) {
                                b.classList.add('selected');
                                b.classList.remove('disabled');
                            } else {
                                b.classList.add('disabled');
                                b.classList.remove('selected');
                            }
                        });

                        renderNode(option.nextId);
                    };
                    optionsContainer.appendChild(btn);
                });
                stepDiv.appendChild(optionsContainer);
            }

            pathwayContent.appendChild(stepDiv);
            stepDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 3. NEWS2 CALCULATOR MODAL LOGIC
        function closeNews2() {
            document.getElementById("news2-modal").style.display = "none";
        }

        function calculateNews2() {
            alert("This connects to the math logic for NEWS2 calculations. Ready to be programmed next!");
        }

        // Boot Application
        initMenu();

    </script>
</body>
</html>
