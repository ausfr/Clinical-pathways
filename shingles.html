<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shingles Flowchart</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --orange: #e27d60;
            --grey-box: #8e8d8a;
            --teal: #659dbd;
            --light-blue: #a3c2de;
            --green: #859a71;
            --coral: #e8a87c;
            --yellow: #fdf498;
            --line-color: #ccc;
            --red-alert: #D5281B;
        }

        body { font-family: Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        
        .back-nav { display:inline-block; margin-bottom: 20px; padding: 10px 15px; background: #768692; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; transition: 0.2s;}
        .back-nav:hover { background: #4C6272; }

        .flowchart-container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }

        .node { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 450px; font-size: 0.95em; line-height: 1.4; transition: all 0.3s ease; position: relative; }
        .node h3 { margin: 0 0 10px 0; font-size: 1.1em; color: white; }

        .bg-orange { background-color: var(--orange); color: white; }
        .bg-grey { background-color: var(--grey-box); color: white; }
        .bg-teal { background-color: var(--teal); color: white; }
        .bg-light-blue { background-color: var(--light-blue); color: #333; font-weight: bold; }
        .bg-green { background-color: var(--green); color: white; }
        .bg-red { background-color: var(--red-alert); color: white; }
        .bg-coral { background-color: var(--coral); color: #333; }
        
        .gateway { background-color: var(--yellow); border: 2px solid red; color: red; font-weight: bold; padding: 5px 15px; border-radius: 4px; margin-bottom: -10px; z-index: 2; }

        .flow-row { display: flex; justify-content: center; align-items: flex-start; width: 100%; position: relative; }
        .side-branch { display: flex; align-items: center; margin-left: 20px; }
        .vertical-branch { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .connector-line { width: 40px; height: 2px; background-color: var(--line-color); position: relative; margin-top: 30px;}
        .connector-line.yes::after { content: "YES"; position: absolute; top: -20px; left: 10px; font-size: 0.8em; color: #666; font-weight: bold; }
        .connector-line.no::after { content: "NO"; position: absolute; top: -20px; left: 10px; font-size: 0.8em; color: #666; font-weight: bold; }

        .down-arrow { width: 2px; height: 20px; background-color: var(--line-color); margin: 0 auto; position: relative; }
        .down-arrow.has-no::after { content: "NO"; position: absolute; top: 0; left: 10px; font-size: 0.8em; color: #666; font-weight: bold; }
        .down-arrow.has-yes::after { content: "YES"; position: absolute; top: 0; left: 10px; font-size: 0.8em; color: #666; font-weight: bold; }

        .split-columns { display: flex; justify-content: center; align-items: flex-start; width: 100%; gap: 30px; margin-top: 10px; }
        .col { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 400px; }

        .action-btns { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap;}
        button.flow-btn { background-color: white; color: #333; border: 2px solid transparent; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.flow-btn:hover { background-color: #eee; }
        button.flow-btn.selected { border: 3px solid #000; background-color: #e0e0e0; }
        button.flow-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(80%); display: none; }
        .unlocked { display: flex; animation: fadeIn 0.4s ease-in-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); filter: grayscale(80%); }
            to { opacity: 1; transform: translateY(0); filter: grayscale(0%); }
        }

        /* NEWS2 Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); overflow: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-family: Arial, sans-serif;}
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-modal:hover { color: black; }
        .calc-form-group { margin-bottom: 12px; }
        .calc-form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em;}
        .calc-form-group input, .calc-form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #news2-result { margin-top: 15px; padding: 15px; border-radius: 6px; font-size: 1.2em; font-weight: bold; text-align: center; display: none; }
        .btn-news { background-color: var(--red-alert); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;}
        .btn-news:hover { background-color: #b71c1c; }
    </style>
</head>
